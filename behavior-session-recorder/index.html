<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Behavior Session Recorder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="recorder-panel" aria-labelledby="pageTitle">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">SURAKSHA data collection test</p>
          <h1 id="pageTitle">Behavior Session Recorder</h1>
        </div>
        <div class="session-count">
          <span id="sessionCount">0</span>
          <small>sessions</small>
        </div>
      </div>

      <form id="loginForm" class="login-form">
        <label for="participant">Participant</label>
        <input id="participant" name="participant" type="text" autocomplete="off" placeholder="Your name or ID">

        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="Enter username">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter password">

        <button id="recordButton" type="submit">Record Login Session</button>
      </form>

      <section class="output-panel" aria-live="polite">
        <div class="output-header">
          <span id="statusMessage">Move the mouse and type into the fields, then record a session.</span>
          <button id="resetButton" class="secondary" type="button">Reset Current</button>
        </div>

        <div class="stats-grid">
          <div>
            <strong id="mouseCount">0</strong>
            <span>mouse events</span>
          </div>
          <div>
            <strong id="keyCount">0</strong>
            <span>keyboard events</span>
          </div>
          <div>
            <strong id="targetCount">50</strong>
            <span>target sessions</span>
          </div>
        </div>

        <pre id="jsonPreview">{}</pre>

        <div class="button-row">
          <button id="downloadLastButton" class="secondary" type="button" disabled>Download Last Session</button>
          <button id="downloadAllButton" type="button" disabled>Download All Sessions</button>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
