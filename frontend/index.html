<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SURAKSHA Authentication</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="login-card" aria-labelledby="app-title">
      <h1 id="app-title">SURAKSHA Authentication Demo</h1>
      <p class="subtitle">Passive behavioral authentication prototype</p>

      <form id="loginForm" class="login-form">
        <label class="honeypot-field" for="companyWebsite" aria-hidden="true">
          Company website
          <input id="companyWebsite" name="companyWebsite" type="text" tabindex="-1" autocomplete="off">
        </label>

        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="Enter username">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter password">

        <div class="button-row">
          <button id="loginButton" type="submit">Login</button>
          <button id="botButton" class="secondary" type="button">Simulate Bot</button>
        </div>
      </form>

      <section class="result-panel" aria-live="polite">
        <div class="classification-row">
          <span>Classification</span>
          <strong id="classificationBadge" class="classification-badge classification-idle">Awaiting</strong>
        </div>
        <div class="result-header">
          <span>Risk score</span>
          <strong id="riskValue">--</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="riskBar" class="progress-bar"></div>
        </div>
        <div id="statusMessage" class="status-message">Awaiting login attempt</div>
        <div id="loadingIndicator" class="loading-indicator" hidden>
          <span class="spinner" aria-hidden="true"></span>
          <span>Analyzing behavioral biometrics...</span>
        </div>
        <section id="reasonsPanel" class="analysis-section" hidden>
          <h2>Backend reasons</h2>
          <ul id="reasonsList" class="reasons-list"></ul>
        </section>
        <section id="botSignalsPanel" class="analysis-section" hidden>
          <h2>Bot simulation signals</h2>
          <ul id="botSignalsList" class="signal-list"></ul>
        </section>
      </section>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
